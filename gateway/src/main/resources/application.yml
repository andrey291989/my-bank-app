server:
  port: 8081

spring:
  application:
    name: gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:8080"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: SERVICE_UNAVAILABLE
        - name: CircuitBreaker
          args:
            name: default
            fallbackUri: forward:/fallback/default

    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        service-name: gateway
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 10s
      config:
        enabled: true
        format: YAML
        prefix: config
        default-context: application

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000
          jwk-set-uri: http://localhost:9000/protocol/openid-connect/certs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    ru.yandex.practicum: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO