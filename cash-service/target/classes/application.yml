server:
  port: 8083

spring:
  application:
    name: cash-service

  datasource:
    url: jdbc:postgresql://localhost:5432/bank_db
    username: bank_user
    password: bank_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: cash_schema

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: cash_schema
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000
          jwk-set-uri: http://localhost:9000/protocol/openid-connect/certs
      client:
        registration:
          cash-client:
            client-id: cash-service
            client-secret: cash-secret
            scope: openid,profile
            authorization-grant-type: client_credentials
        provider:
          cash-client:
            issuer-uri: http://localhost:9000

  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        service-name: cash-service
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 10s
      config:
        enabled: true
        format: YAML
        prefix: config
        default-context: application

services:
  accounts:
    url: http://accounts-service
  notifications:
    url: http://notifications-service

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    ru.yandex.practicum: DEBUG
    org.springframework.security: INFO