apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "bank-app-chart.fullname" . }}-test-connection"
  labels:
    {{- include "bank-app-chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "bank-app-chart.fullname" . }}-front-ui:{{ .Values.frontUi.service.port }}']
  restartPolicy: Never