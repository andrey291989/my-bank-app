apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.fullname" . }}-secrets
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque
data:
  database-password: {{ .Values.database.password | b64enc | quote }}
  admin-password: {{ .Values.keycloak.adminPassword | b64enc | quote }}